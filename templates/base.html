{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tasty Recipes</title>

    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <link rel="stylesheet" href="{% static 'css/mobile.css' %}">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

<header class="navbar">
    <div class="nav-container">

        <!-- Logo -->
        <a href="{% url 'home' %}" class="logo">
            <i class="fa-solid fa-utensils"></i>
            Tasty<span>Recipes</span>
        </a>
        <button class="menu-toggle" id="menu-toggle">
    <i class="fa-solid fa-bars"></i>
</button>

        <!-- Navigation -->
        <ul class="nav-menu" id="nav-menu">

    <li>
        <a href="{% url 'home' %}"
           class="{% if request.path == '/' %}active{% endif %}">
            <i class="fa-solid fa-house"></i>
            Home
        </a>
    </li>

    {% if user.is_authenticated %}

    <li>
        <a href="{% url 'dashboard' %}"
           class="{% if request.path == '/dashboard/' %}active{% endif %}">
            <i class="fa-solid fa-table-columns"></i>
            Dashboard
        </a>
    </li>

    <li>
        <a href="{% url 'favorites' %}"
           class="{% if request.path == '/favorites/' %}active{% endif %}">
            <i class="fa-solid fa-heart"></i>
            Favorites
        </a>
    </li>

    <li>
        <a href="{% url 'profile' %}"
           class="{% if request.path == '/profile/' %}active{% endif %}">
            <i class="fa-solid fa-user"></i>
            Profile
        </a>
    </li>

    <li>
        <a href="{% url 'logout' %}">
            <i class="fa-solid fa-right-from-bracket"></i>
            Logout
        </a>
    </li>

    {% else %}

    <li>
        <a href="{% url 'login' %}"
           class="{% if request.path == '/login/' %}active{% endif %}">
            <i class="fa-solid fa-right-to-bracket"></i>
            Login
        </a>
    </li>

    <li>
        <a href="{% url 'register' %}"
           class="{% if request.path == '/register/' %}active{% endif %}">
            <i class="fa-solid fa-user-plus"></i>
            Sign Up
        </a> 
    </li>

    {% endif %}

    <!-- Theme Button -->
   <li>
    <button id="theme-toggle" type="button">
        <i id="theme-icon" class="fa-solid fa-moon"></i>
    </button>
</li>

</ul>
    </div>
</header>

<div class="container">
    {% block content %}
    {% endblock %}
</div>
<footer class="footer">
    <p>© 2026 Tasty Recipes. All Rights Reserved.</p>
</footer>


<script>

const toggleBtn =
document.getElementById('theme-toggle');

if(localStorage.getItem('theme') === 'dark'){
    document.body.classList.add('dark-mode');
    toggleBtn.innerHTML =
        '<i class="fa-solid fa-sun"></i>';
}

toggleBtn.addEventListener('click', () => {

    document.body.classList.toggle('dark-mode');

    if(document.body.classList.contains('dark-mode')){
        localStorage.setItem('theme', 'dark');
        toggleBtn.innerHTML =
            '<i class="fa-solid fa-sun"></i>';
    }
    else{
        localStorage.setItem('theme', 'light');
        toggleBtn.innerHTML =
            '<i class="fa-solid fa-moon"></i>';
    }
});

const menuBtn = document.getElementById("menu-toggle");
const navMenu = document.getElementById("nav-menu");

if(menuBtn && navMenu){
    menuBtn.addEventListener("click", function(){
        navMenu.classList.toggle("show");
    });
}
</script>
</body>
</html>

{% extends 'base.html' %}

{% block content %}

<div class="profile-container">

    <div class="profile-card">

        <div class="profile-avatar">
            <i class="fa-solid fa-user"></i>
        </div>

        <h1>
            {{ request.user.username }}
        </h1>

        <p>
            {{ request.user.email }}
        </p>

        <div class="profile-stats">

            <div class="stat-box">
                <h2>{{ total_recipes }}</h2>
                <span>Recipes</span>
            </div>

            <div class="stat-box">
                <h2>{{ total_favorites }}</h2>
                <span>Favorites</span>
            </div>

            <div class="stat-box">
                <h2>{{ total_comments }}</h2>
                <span>Comments</span>
            </div>

        </div>

    </div>

</div>

{% endblock %}

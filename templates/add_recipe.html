{% extends 'base.html' %}

{% block content %}

<div class="form-page">

    <div class="form-container">

        <div class="form-header">
            <h1>
                <i class="fas fa-utensils"></i>
                Add New Recipe
            </h1>

            <p>
                Share your delicious recipe with everyone.
            </p>
        </div>

        <form method="POST" enctype="multipart/form-data">

            {% csrf_token %}

            <!-- Recipe Title -->
            <div class="form-group">
                <label for="{{ form.title.id_for_label }}">
                    Recipe Title
                </label>
                {{ form.title }}
            </div>

            <!-- Category -->
            <div class="form-group">
                <label for="{{ form.category.id_for_label }}">
                    Category
                </label>
                {{ form.category }}
            </div>

            <!-- New Category -->
            <div class="form-group">
                <label for="new_category">
                    New Category (Optional)
                </label>

                <input
                    type="text"
                    id="new_category"
                    name="new_category"
                    class="form-control"
                    placeholder="Enter new category">
            </div>

            <!-- Description -->
            <div class="form-group">
                <label for="{{ form.description.id_for_label }}">
                    Description
                </label>
                {{ form.description }}
            </div>

            <!-- Ingredients -->
            <div class="form-group">
                <label for="{{ form.ingredients.id_for_label }}">
                    Ingredients
                </label>
                {{ form.ingredients }}
            </div>

            <!-- Instructions -->
            <div class="form-group">
                <label for="{{ form.instructions.id_for_label }}">
                    Instructions
                </label>
                {{ form.instructions }}
            </div>

            <!-- Image -->
            <div class="form-group">
                <label for="{{ form.image.id_for_label }}">
                    Recipe Image
                </label>
                {{ form.image }}
            </div>

            <div class="form-buttons">

                <a href="{% url 'dashboard' %}"
                   class="cancel-btn">
                    Cancel
                </a>

                <button
                    type="submit"
                    class="submit-btn">
                    <i class="fas fa-plus"></i>
                    Save Recipe
                </button>

            </div>

        </form>

    </div>

</div>

{% endblock %}

services:
  - type: web
    name: tasty-recipes
    env: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn tastyrecipes.wsgi:application"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: tasty-recipes-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: WEB_CONCURRENCY
        value: 4